services:
  # ==========================================
  # 统一入口与负载均衡网关 (Nginx)
  # 这里的环境变量使用的是backend文件夹下的参数 使用run.sh或run.bat启动即可
  # 如果想要单独运行前端或者后端 使用各个文件夹下的run脚本即可。
  # ==========================================
  nginx:
    image: nginx:alpine
    ports:
      - "${NGINX_HOST_PORT:-8088}:80"
    volumes:
      - ./src/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - backend1
      - backend2

  # ==========================================
  # 前端服务 (React / Vite)
  # ==========================================
  frontend:
    build:
      context: ./src/frontend/app
      dockerfile: Dockerfile.dev
    volumes:
      - ./src/frontend/app:/app
      - frontend-node-modules:/app/node_modules
      - frontend-pnpm-store:/pnpm/store
    environment:
      - CHOKIDAR_USEPOLLING=true
      # 局域网设备访问时 HMR 回连用的端口，与 Nginx 对外端口保持一致
      - VITE_PUBLIC_PORT=${NGINX_HOST_PORT:-8088}
    # 由于统一被 nginx 接管，宿主机不直接映射前端端口（避免冲突），通过 localhost:80 访问即可
    # ports:
    #   - "5173:5173"
    command: sh -c "pnpm config set store-dir /pnpm/store && pnpm install --frozen-lockfile && pnpm dev --host 0.0.0.0"

  # ==========================================
  # 后端服务 (Spring Boot) - 展示分布式特性
  # ==========================================
  backend1:
    build:
      context: ./src/backend/java
      network: host
      args:
        # Optional. Leave empty unless the host actually has a proxy available.
        GRADLE_PROXY_HOST: ${GRADLE_PROXY_HOST:-}
        GRADLE_PROXY_PORT: ${GRADLE_PROXY_PORT:-}
    depends_on:
      redis:
        condition: service_started
      mysql:
        condition: service_healthy
    restart: unless-stopped
    environment:
      REALTIME_BROADCASTER: redis
      REDIS_HOST: redis
      REDIS_PORT: 6379
      MYSQL_URL: jdbc:mysql://mysql:3306/cocanvas?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&rewriteBatchedStatements=true
      MYSQL_USER: root
      MYSQL_PASSWORD: ${MYSQL_ROOT_PASSWORD:-cocanvas123}
      JOIN_TOKEN_SECRET: ${JOIN_TOKEN_SECRET:-cocanvas-dev-secret}
      NODE_PUBLIC_HOST: localhost
      NODE_PUBLIC_PORT: ${NGINX_HOST_PORT:-8088}
      NODE_PUBLIC_WS_PATH: /ws/backend1/collab
      NODE_ID: backend1
      AI_API_KEY: ${AI_API_KEY:-sk-b541487df6aa4b02aecab78d1d955ce5}
    # 宿主机上不要映射后端端口，统一由 Nginx 的 80 端口转发进入。

  backend2:
    build:
      context: ./src/backend/java
      network: host
      args:
        GRADLE_PROXY_HOST: ${GRADLE_PROXY_HOST:-}
        GRADLE_PROXY_PORT: ${GRADLE_PROXY_PORT:-}
    depends_on:
      redis:
        condition: service_started
      mysql:
        condition: service_healthy
    restart: unless-stopped
    environment:
      REALTIME_BROADCASTER: redis
      REDIS_HOST: redis
      REDIS_PORT: 6379
      MYSQL_URL: jdbc:mysql://mysql:3306/cocanvas?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&rewriteBatchedStatements=true
      MYSQL_USER: root
      MYSQL_PASSWORD: ${MYSQL_ROOT_PASSWORD:-cocanvas123}
      JOIN_TOKEN_SECRET: ${JOIN_TOKEN_SECRET:-cocanvas-dev-secret}
      NODE_PUBLIC_HOST: localhost
      NODE_PUBLIC_PORT: ${NGINX_HOST_PORT:-8088}
      NODE_PUBLIC_WS_PATH: /ws/backend2/collab
      NODE_ID: backend2
      AI_API_KEY: ${AI_API_KEY:-sk-b541487df6aa4b02aecab78d1d955ce5}

  # ==========================================
  # 基础设施
  # ==========================================
  redis:
    image: redis:7

  mysql:
    image: mysql:8
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-cocanvas123}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-cocanvas}
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$${MYSQL_ROOT_PASSWORD} --silent"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 30s
    ports:
      - "${MYSQL_HOST_PORT:-3307}:3306"
    volumes:
      - cocanvas-mysql-data:/var/lib/mysql

volumes:
  cocanvas-mysql-data:
  frontend-node-modules:
  frontend-pnpm-store:
