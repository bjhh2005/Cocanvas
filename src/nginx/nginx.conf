events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    # 配置后端服务的负载均衡 (Load Balancing)
    # Docker 内部 DNS 将自动解析 'backend' 到所有副本的 IP 地址
    upstream backend_servers {
        server backend:8080;
    }

    # 配置前端服务
    upstream frontend_servers {
        server frontend:5173;
    }

    server {
        listen 80;
        server_name localhost;

        # 1. 将普通请求转发给前端 (React/Vite)
        location / {
            proxy_pass http://frontend_servers;
            
            # 以下三行配置用于支持 WebSocket，对于 Vite 热更新 (HMR) 必不可少
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
        }

        # 2. 将 /ws/ 开头的请求代理到后端（需要 WebSocket 升级头）
        location /ws/ {
            proxy_pass http://backend_servers;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            # WebSocket 长连接超时：默认 60s 会断开，调大避免空闲被踢
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }

        # 3. 将 /api/ 开头的请求代理到后端 Spring Boot 集群
        # 注意：如果后端接口不是以 /api/ 开头的话，可能需要在后端配置 context-path 或者在这里使用 rewrite 重写路径
        location /api/ {
            # 添加了尾部的斜杠 / ，这样 Nginx 会自动把前端发来的 /api/ 前缀剥离掉
            proxy_pass http://backend_servers/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
