events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    # 配置后端服务的负载均衡 (Load Balancing)
    upstream backend_servers {
        server backend1:8080;
        server backend2:8080;
    }

    # 配置前端服务
    upstream frontend_servers {
        server frontend:5173;
    }

    server {
        listen 80;
        server_name localhost;

        # 1. 将普通请求转发给前端 (React/Vite)
        location / {
            proxy_pass http://frontend_servers;
            
            # 以下三行配置用于支持 WebSocket，对于 Vite 热更新 (HMR) 必不可少
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
        }

        # 2. 将 /api/ 开头的请求代理到后端 Spring Boot 集群
        # 注意：如果后端接口不是以 /api/ 开头的话，可能需要在后端配置 context-path 或者在这里使用 rewrite 重写路径
        location /api/ {
            # 添加了尾部的斜杠 / ，这样 Nginx 会自动把前端发来的 /api/ 前缀剥离掉
            proxy_pass http://backend_servers/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # 3. 将一致性哈希返回的节点专属 WebSocket 路径代理到指定后端
        location = /ws/backend1/collab {
            proxy_pass http://backend1:8080/ws/collab;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location = /ws/backend2/collab {
            proxy_pass http://backend2:8080/ws/collab;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # 4. 保留通用 WebSocket 入口，用于本地开发或兼容旧链接
        location /ws/ {
            proxy_pass http://backend_servers;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
