services:
  frontend:
    build:
      context: ./app
      dockerfile: Dockerfile.dev
    ports:
      - "${FRONTEND_HOST_PORT:-5173}:5173"
    volumes:
      - ./app:/app
      - frontend-node-modules:/app/node_modules
      - frontend-pnpm-store:/pnpm/store
    environment:
      - CHOKIDAR_USEPOLLING=true
      # 让 pnpm 在 node_modules 与 lockfile 失配时自动清理，不要求 TTY 确认
      - CI=true
    command: sh -c "pnpm config set store-dir /pnpm/store && pnpm install --frozen-lockfile && pnpm dev --host 0.0.0.0"

volumes:
  frontend-node-modules:
  frontend-pnpm-store:
