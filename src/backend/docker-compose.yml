services:
  backend:
    build:
      context: ./java
      network: host
      args:
        GRADLE_PROXY_HOST: ${GRADLE_PROXY_HOST:-127.0.0.1}
        GRADLE_PROXY_PORT: ${GRADLE_PROXY_PORT:-26797}
    depends_on:
      - redis
      - mysql
    ports:
      - "${BACKEND_HOST_PORT:-8080}:8080"

  backend-test:
    build:
      context: ./java
      target: build
      network: host
      args:
        GRADLE_PROXY_HOST: ${GRADLE_PROXY_HOST:-127.0.0.1}
        GRADLE_PROXY_PORT: ${GRADLE_PROXY_PORT:-26797}
    profiles:
      - test
    command: ./gradlew test --no-daemon

  redis:
    image: redis:7
    ports:
      - "${REDIS_HOST_PORT:-6379}:6379"

  mysql:
    image: mysql:8
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-cocanvas123}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-cocanvas}
    ports:
      - "${MYSQL_HOST_PORT:-3307}:3306"
    volumes:
      - cocanvas-mysql-data:/var/lib/mysql

volumes:
  cocanvas-mysql-data:
