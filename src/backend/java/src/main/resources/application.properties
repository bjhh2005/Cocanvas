spring.application.name=cocanvas-backend
realtime.broadcaster=${REALTIME_BROADCASTER:local}
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
node.public-host=${NODE_PUBLIC_HOST:localhost}
node.public-port=${NODE_PUBLIC_PORT:8080}
node.id=${NODE_ID:}
spring.datasource.url=${MYSQL_URL:jdbc:mysql://localhost:3307/cocanvas?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${MYSQL_USER:root}
spring.datasource.password=${MYSQL_PASSWORD:cocanvas123}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
