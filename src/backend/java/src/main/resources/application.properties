spring.application.name=cocanvas-backend
realtime.broadcaster=${REALTIME_BROADCASTER:local}
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
node.public-host=${NODE_PUBLIC_HOST:localhost}
node.public-port=${NODE_PUBLIC_PORT:8080}
node.public-ws-path=${NODE_PUBLIC_WS_PATH:/ws/collab}
node.id=${NODE_ID:}
spring.datasource.url=${MYSQL_URL:jdbc:mysql://localhost:3307/cocanvas?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&rewriteBatchedStatements=true}
spring.datasource.username=${MYSQL_USER:root}
spring.datasource.password=${MYSQL_PASSWORD:cocanvas123}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
# 批量写后置：Hibernate JDBC batch，配合 rewriteBatchedStatements 实现真正的多行 INSERT
spring.jpa.properties.hibernate.jdbc.batch_size=100
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
history.flush-interval-ms=200
ai.api-key=${AI_API_KEY:sk-b541487df6aa4b02aecab78d1d955ce5}
ai.api-url=${AI_API_URL:https://api.deepseek.com/chat/completions}
ai.model=${AI_MODEL:deepseek-chat}
ai.timeout-ms=${AI_TIMEOUT_MS:20000}
ai.max-tokens=${AI_MAX_TOKENS:2048}
ai.max-prompt-chars=${AI_MAX_PROMPT_CHARS:4000}
ai.max-context-chars=${AI_MAX_CONTEXT_CHARS:12000}
ai.max-ops=${AI_MAX_OPS:8}
ai.rate-limit-window-ms=${AI_RATE_LIMIT_WINDOW_MS:60000}
ai.rate-limit-max-requests=${AI_RATE_LIMIT_MAX_REQUESTS:8}
auth-token.secret=${AUTH_TOKEN_SECRET:cocanvas-auth-dev-secret}
auth-token.ttl-ms=${AUTH_TOKEN_TTL_MS:604800000}
